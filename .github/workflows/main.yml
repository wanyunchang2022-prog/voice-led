name: Build ESP32-S3 Firmware

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Merge project to root
        run: |
          cp -r voice-led-source/* . 2>/dev/null || true
          cp -r voice-led-source/.[!.]* . 2>/dev/null || true
          mkdir -p src
          echo "// placeholder" > src/main.c
          echo "=== project root ==="
          ls platformio.ini CMakeLists.txt main/main.c src/main.c 2>/dev/null || true
      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run
        timeout-minutes: 20

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: .pio/build/esp32-s3-devkitc-1/firmware.bin
