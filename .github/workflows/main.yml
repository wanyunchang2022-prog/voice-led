name: Build ESP32-S3 Firmware

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Flatten project structure
        run: |
          echo "=== contents ==="
          find . -maxdepth 3 -name "platformio.ini" -o -name "CMakeLists.txt" | head -10
          echo "=== voice-led-source ==="
          ls -la voice-led-source/
          echo "=== main dir ==="
          if [ -d voice-led-source/main ]; then echo "main FOUND in root"; fi
          if [ -d voice-led-source/voice-led-source ]; then echo "DOUBLE NESTING found"; fi

      - name: Fix project path
        run: |
          if [ -d voice-led-source/voice-led-source ]; then
            echo "Fixing double nesting..."
            mv voice-led-source/voice-led-source/* voice-led-source/ 2>/dev/null
            mv voice-led-source/voice-led-source/.[!.]* voice-led-source/ 2>/dev/null
            rmdir voice-led-source/voice-led-source 2>/dev/null
          fi
          if [ -f voice-led-source/platformio.ini ]; then
            echo "PROJECT_DIR=voice-led-source" | tee -a $GITHUB_ENV
          elif [ -f platformio.ini ]; then
            echo "PROJECT_DIR=." | tee -a $GITHUB_ENV
          fi

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: |
          cd ${{ env.PROJECT_DIR }}
          pio run -v
        timeout-minutes: 30

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: ${{ env.PROJECT_DIR }}/.pio/build/esp32-s3-devkitc-1/firmware.bin
