name: Build ESP32-S3 Firmware

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Flatten and fix project
        run: |
          echo "=== contents ==="
          find . -maxdepth 2 -name "platformio.ini" -o -name "CMakeLists.txt" | head -10
          # Fix double nesting
          if [ -d voice-led-source/voice-led-source ]; then
            mv voice-led-source/voice-led-source/* voice-led-source/ 2>/dev/null || true
            mv voice-led-source/voice-led-source/.[!.]* voice-led-source/ 2>/dev/null || true
            rmdir voice-led-source/voice-led-source 2>/dev/null || true
          fi
          if [ -f voice-led-source/platformio.ini ]; then
            echo "PROJECT_DIR=voice-led-source" | tee -a $GITHUB_ENV
          else
            echo "PROJECT_DIR=." | tee -a $GITHUB_ENV
          fi
          echo "Project dir: $PROJECT_DIR"
          ls -la $PROJECT_DIR/

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: |
          cd ${{ env.PROJECT_DIR }}
          pio run -v
        timeout-minutes: 30

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: ${{ env.PROJECT_DIR }}/.pio/build/esp32-s3-devkitc-1/firmware.bin
